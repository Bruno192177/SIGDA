<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin</title>

    <link rel="stylesheet" href="admin.css">

    <!-- FullCalendar -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>

    <script src="admin.js" defer></script>
</head>

<body class="admin-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2 class="logo">SIGDA</h2>
        <nav>
            <ul>
                <li><a href="/admin">📅 Calendario</a></li>
                <li><a href="/documentos">📁 Documentos</a></li>
                <li><a href="padron">👥 Padrón</a></li>
            </ul>
        </nav>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="main-content">

        <!-- NAVBAR -->
        <header class="navbar">
            <h1>Panel de Administración</h1>

            <div class="user-menu">
                <div class="user-dropdown">

                    <span id="username">Usuario ▾</span>

                    <div class="dropdown-menu" id="dropdown">
                        <p id="user-name">Usuario</p>
                        <hr>
                        <button id="logout-btn">Cerrar sesión</button>
                    </div>

                </div>
            </div>
        </header>

        <!-- CONTENIDO -->
        <section class="content">
            <h2>Calendario</h2>
            <div id="calendar"></div>
        </section>

    </div> 


    <!-- MODAL -->
    <div id="event-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Evento</h3>

            <input type="text" id="event-title" placeholder="Título">

            <input type="datetime-local" id="event-start">
            <input type="datetime-local" id="event-end">

            <textarea id="event-desc" placeholder="Descripción"></textarea>

            <button id="save-event">Guardar</button>
            <button id="delete-event">Eliminar</button>
            <button id="close-modal">Cancelar</button>
        </div>
    </div>

</body>
</html>
